<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Skill Runner - 功能演示</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-top: -20px;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 16px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h2 .icon {
            font-size: 1.2em;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .demo-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .demo-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .demo-btn:active {
            transform: translateY(-1px);
        }

        .demo-btn .title {
            font-size: 15px;
            margin-bottom: 6px;
        }

        .demo-btn .desc {
            font-size: 11px;
            opacity: 0.85;
            font-weight: 400;
        }

        .demo-btn.btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .demo-btn.btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .demo-btn.btn-warning {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
        }

        .demo-btn.btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="number"] {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            width: 100px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .task-info {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .task-info-item {
            background: #f5f5f5;
            padding: 10px 16px;
            border-radius: 8px;
            min-width: 120px;
        }

        .task-info-item .label {
            color: #666;
            font-size: 11px;
        }

        .task-info-item .value {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-running { background: #cce5ff; color: #004085; }
        .status-done { background: #d4edda; color: #155724; }
        .status-failed { background: #f8d7da; color: #721c24; }
        .status-cancelled { background: #e2e3e5; color: #383d41; }

        .log-container {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: "Fira Code", "Consolas", monospace;
            font-size: 13px;
        }

        .log-line {
            color: #d4d4d4;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .log-line .step { color: #569cd6; }
        .log-line .message { color: #dcdcaa; }
        .log-line.result .message { color: #4ec9b0; }
        .log-line.error .message { color: #f44747; }
        .log-line.heartbeat { color: #6a9955; font-style: italic; }
        .log-line.connected { color: #4ec9b0; }

        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            margin-top: 6px;
            color: #666;
            font-size: 12px;
        }

        .task-list {
            display: grid;
            gap: 12px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .task-item.active {
            border-left-color: #38ef7d;
            background: #f0fff4;
        }

        .task-item .task-id {
            font-family: monospace;
            font-weight: 600;
            color: #333;
            min-width: 80px;
        }

        .task-item .task-status {
            flex: 1;
        }

        .task-item .task-btn {
            padding: 6px 12px;
            font-size: 12px;
        }

        .log-container-demo {
            max-height: 200px;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .demo-grid { grid-template-columns: repeat(2, 1fr); }
            .two-col { grid-template-columns: 1fr; }
        }

        .highlight-box {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .highlight-box h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .highlight-box p {
            color: #555;
            font-size: 13px;
            line-height: 1.6;
        }

        .feature-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #333;
        }

        .feature-item .check {
            color: #38ef7d;
            font-weight: bold;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mini Skill Runner</h1>
        <p class="subtitle">实时任务执行系统 - 功能演示平台</p>

        <!-- 功能演示区 -->
        <div class="card">
            <h2><span class="icon">🎯</span> 快速功能演示</h2>
            <div class="demo-grid">
                <button class="demo-btn btn-success" onclick="demo1()">
                    <div class="title">1. 实时进度推送</div>
                    <div class="desc">SSE 流式推送任务执行进度</div>
                </button>
                <button class="demo-btn btn-success" onclick="demo2()">
                    <div class="title">2. 断线重连</div>
                    <div class="desc">重连后补发历史事件</div>
                </button>
                <button class="demo-btn btn-danger" onclick="demo3()">
                    <div class="title">3. 超时自动取消</div>
                    <div class="desc">3秒超时，8秒任务</div>
                </button>
                <button class="demo-btn btn-warning" onclick="demo4()">
                    <div class="title">4. 孤儿任务取消</div>
                    <div class="desc">60秒无连接自动取消</div>
                </button>
                <button class="demo-btn btn-info" onclick="demo5()">
                    <div class="title">5. 多客户端踢除</div>
                    <div class="desc">新连接踢除旧连接</div>
                </button>
                <button class="demo-btn btn-success" onclick="demo6()">
                    <div class="title">6. 任务状态查询</div>
                    <div class="desc">RESTful API 查询</div>
                </button>
            </div>
        </div>

        <!-- 实时演示区 -->
        <div class="two-col">
            <div class="card">
                <h2><span class="icon">📝</span> 创建任务</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>输入内容</label>
                        <input type="text" id="input" value="hello world" placeholder="输入任意文字">
                    </div>
                    <div class="form-group" style="max-width: 120px;">
                        <label>超时(秒)</label>
                        <input type="number" id="timeout" value="30" min="1" max="120">
                    </div>
                </div>
                <button class="btn" id="createBtn" onclick="createTask()">创建并订阅</button>

                <div id="taskCard" class="hidden" style="margin-top: 20px;">
                    <div class="task-info">
                        <div class="task-info-item">
                            <div class="label">任务 ID</div>
                            <div class="value" id="taskId">-</div>
                        </div>
                        <div class="task-info-item">
                            <div class="label">状态</div>
                            <div class="value"><span class="status-badge" id="taskStatus">-</span></div>
                        </div>
                        <div class="task-info-item">
                            <div class="label">事件数</div>
                            <div class="value" id="eventCount">0</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">等待开始...</div>
                    <div class="log-container log-container-demo" id="logContainer">
                        <div class="log-line">等待连接...</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2><span class="icon">📋</span> 任务列表</h2>
                <div class="highlight-box">
                    <h3>💡 操作提示</h3>
                    <p id="tipText">点击上方按钮开始功能演示</p>
                </div>
                <div class="task-list" id="taskList">
                    <div class="task-item" style="opacity: 0.6;">
                        <span class="task-id">-</span>
                        <span class="task-status">暂无任务</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 功能说明 -->
        <div class="card">
            <h2><span class="icon">✨</span> 系统特性</h2>
            <div class="feature-list">
                <div class="feature-item"><span class="check">✓</span> 子进程生命周期管理（超时Kill）</div>
                <div class="feature-item"><span class="check">✓</span> SSE 实时进度推送</div>
                <div class="feature-item"><span class="check">✓</span> 断线重连事件补发</div>
                <div class="feature-item"><span class="check">✓</span> 60秒孤儿任务自动取消</div>
                <div class="feature-item"><span class="check">✓</span> 多客户端连接踢除</div>
                <div class="feature-item"><span class="check">✓</span> 10秒心跳保活机制</div>
                <div class="feature-item"><span class="check">✓</span> asyncio Lock 并发安全</div>
                <div class="feature-item"><span class="check">✓</span> 僵尸进程防护</div>
            </div>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        let eventSource = null;
        let reconnectTimeout = null;
        let allTasks = [];

        // 创建任务
        async function createTask(timeoutOverride) {
            const input = document.getElementById('input').value || 'hello world';
            const timeout = timeoutOverride || parseInt(document.getElementById('timeout').value);

            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.textContent = '创建中...';

            try {
                const response = await fetch('/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input, timeout })
                });

                if (!response.ok) throw new Error('创建任务失败');
                const data = await response.json();

                currentTaskId = data.task_id;
                document.getElementById('taskId').textContent = currentTaskId;
                updateStatus('pending');
                document.getElementById('eventCount').textContent = '0';
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('progressText').textContent = '等待开始...';
                document.getElementById('logContainer').innerHTML = '<div class="log-line">任务已创建，正在连接...</div>';
                document.getElementById('taskCard').classList.remove('hidden');

                addTaskToList(currentTaskId, 'pending', timeout);
                subscribeToTask(currentTaskId);

                btn.disabled = false;
                btn.textContent = '创建并订阅';
            } catch (error) {
                alert('错误: ' + error.message);
                btn.disabled = false;
                btn.textContent = '创建并订阅';
            }
        }

        // 添加任务到列表
        function addTaskToList(taskId, status, timeout) {
            const taskList = document.getElementById('taskList');
            const item = document.createElement('div');
            item.className = 'task-item active';
            item.id = 'task-item-' + taskId;
            item.innerHTML = `
                <span class="task-id">${taskId}</span>
                <span class="task-status"><span class="status-badge status-${status}">${status}</span></span>
                <button class="btn task-btn" onclick="subscribeTask('${taskId}')">查看</button>
            `;
            // 清空"暂无任务"
            const empty = taskList.querySelector('.task-item[style*="opacity"]');
            if (empty) empty.remove();

            // 插入到最前面
            taskList.insertBefore(item, taskList.firstChild);
            allTasks.push({ taskId, timeout, status });
        }

        // 订阅指定任务
        function subscribeTask(taskId) {
            currentTaskId = taskId;
            document.getElementById('taskId').textContent = taskId;
            document.getElementById('taskCard').classList.remove('hidden');
            document.getElementById('eventCount').textContent = '0';
            document.getElementById('logContainer').innerHTML = '<div class="log-line">正在连接...</div>';
            subscribeToTask(taskId);
        }

        // SSE 订阅
        function subscribeToTask(taskId) {
            if (eventSource) eventSource.close();
            if (reconnectTimeout) clearTimeout(reconnectTimeout);

            const logContainer = document.getElementById('logContainer');

            function addLog(html, className = '') {
                const line = document.createElement('div');
                line.className = 'log-line ' + className;
                line.innerHTML = html;
                logContainer.appendChild(line);
                logContainer.scrollTop = logContainer.scrollHeight;
            }

            function updateProgress(step) {
                const percent = Math.min(step / 3 * 100, 100);
                document.getElementById('progressFill').style.width = percent + '%';
                const texts = ['等待开始', '正在校验输入', '处理中...', '生成结果中', '已完成'];
                document.getElementById('progressText').textContent = texts[Math.min(step, 4)];
            }

            function updateStatusUI(status) {
                document.getElementById('taskStatus').textContent = status;
                document.getElementById('taskStatus').className = 'status-badge status-' + status;
                // 更新列表
                const item = document.getElementById('task-item-' + taskId);
                if (item) {
                    item.querySelector('.task-status').innerHTML = `<span class="status-badge status-${status}">${status}</span>`;
                }
            }

            eventSource = new EventSource(`/tasks/${taskId}/stream`);

            eventSource.addEventListener('connected', function(e) {
                addLog('<span class="connected">✓ 已连接到任务流</span>');
            });

            eventSource.addEventListener('progress', function(e) {
                const data = JSON.parse(e.data);
                document.getElementById('eventCount').textContent =
                    parseInt(document.getElementById('eventCount').textContent) + 1;

                if (data.type === 'log') {
                    addLog(`<span class="step">[Step ${data.step}]</span> <span class="message">${escapeHtml(data.message)}</span>`);
                    updateProgress(data.step);
                } else if (data.type === 'result') {
                    addLog(`<span class="result"><span class="step">[Result]</span> <span class="message">${escapeHtml(data.output)}</span></span>`, 'result');
                    updateProgress(4);
                } else if (data.type === 'error') {
                    addLog(`<span class="error"><span class="step">[Error]</span> <span class="message">${escapeHtml(data.message)}</span></span>`, 'error');
                }
            });

            eventSource.addEventListener('done', function(e) {
                const data = JSON.parse(e.data);
                addLog(`<span class="connected">=== 任务完成: ${data.status} ===</span>`);
                updateStatusUI(data.status);
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressText').textContent = data.status === 'done' ? '任务完成' : '任务失败';
            });

            eventSource.addEventListener('heartbeat', function(e) {
                addLog('<span class="heartbeat">♥ 心跳 (10秒间隔)</span>', 'heartbeat');
            });

            eventSource.addEventListener('kicked', function(e) {
                addLog('<span style="color: #f44747;">⚠ 连接被踢除 (新连接抢占)</span>');
                document.getElementById('progressText').textContent = '已被踢除';
            });

            eventSource.onerror = function(e) {
                addLog('<span class="error">✗ 连接断开</span>');
                reconnectTimeout = setTimeout(() => {
                    if (currentTaskId === taskId) subscribeToTask(taskId);
                }, 5000);
            };
        }

        function updateStatus(status) {
            document.getElementById('taskStatus').textContent = status;
            document.getElementById('taskStatus').className = 'status-badge status-' + status;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== 功能演示函数 ==========

        // 演示1: 实时进度推送
        function demo1() {
            document.getElementById('tipText').innerHTML = '<b>演示1：实时进度推送</b><br>创建一个30秒任务，观察SSE实时推送进度事件，每10秒心跳一次';
            document.getElementById('input').value = 'hello world';
            document.getElementById('timeout').value = 30;
            createTask(30);
        }

        // 演示2: 断线重连
        function demo2() {
            document.getElementById('tipText').innerHTML = '<b>演示2：断线重连</b><br>1. 创建任务后等2-3秒<br>2. 刷新页面重新订阅同一任务ID<br>3. 观察历史事件被补发，然后继续实时接收';
            document.getElementById('input').value = '断线重连测试';
            document.getElementById('timeout').value = 30;
            createTask(30);
        }

        // 演示3: 超时自动取消
        function demo3() {
            document.getElementById('tipText').innerHTML = '<b>演示3：超时自动取消</b><br>创建3秒超时的任务（worker需要8秒）<br>观察3秒后任务被强制取消，状态变为cancelled<br>用 <code>ps aux | grep worker</code> 验证无僵尸进程';
            document.getElementById('input').value = '超时测试';
            document.getElementById('timeout').value = 3;
            createTask(3);
        }

        // 演示4: 孤儿任务取消
        function demo4() {
            document.getElementById('tipText').innerHTML = '<b>演示4：孤儿任务取消</b><br>创建任务后<b>不要订阅</b>，等待60秒<br>观察任务状态从 running 变为 cancelled<br>（60秒无客户端连接会自动取消）';
            document.getElementById('input').value = '孤儿任务测试';
            document.getElementById('timeout').value = 60;
            createTask(60);
            // 不自动订阅
            setTimeout(() => {
                if (eventSource) eventSource.close();
            }, 100);
        }

        // 演示5: 多客户端踢除
        function demo5() {
            document.getElementById('tipText').innerHTML = '<b>演示5：多客户端踢除</b><br>1. 当前页面订阅一个任务<br>2. 用另一个浏览器/标签页打开同一页面<br>3. 订阅同一个任务ID<br>4. 第一个连接收到"被踢除"事件';
            document.getElementById('input').value = '踢除测试';
            document.getElementById('timeout').value = 30;
            createTask(30);
        }

        // 演示6: 任务状态查询
        function demo6() {
            document.getElementById('tipText').innerHTML = '<b>演示6：任务状态查询</b><br>查看右侧任务列表，点击各任务的"查看"按钮<br>或使用 API: <code>GET /tasks/{task_id}/status</code>';
            // 刷新任务列表
            refreshTaskList();
        }

        async function refreshTaskList() {
            // 简单刷新页面
            location.reload();
        }
    </script>
</body>
</html>
